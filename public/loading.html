<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GarageFlow Desk — Starting</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937 0%, #020617 100%);
        color: #f8fafc;
      }

      .card {
        width: min(92vw, 420px);
        padding: 32px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 25px 60px rgba(2, 6, 23, 0.45);
        text-align: center;
      }

      .spinner {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 50%;
        border: 5px solid rgba(255,255,255,0.2);
        border-top-color: #38bdf8;
        animation: spin 0.9s linear infinite;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.5;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner"></div>
      <h1>Starting GarageFlow Desk…</h1>
      <p>Preparing the dashboard and dependencies. This should only take a moment.</p>
    </div>
    <script>
      const target = 'http://localhost:9002/dashboard';
      let attempts = 0;
      const maxAttempts = 90;

      function tryOpen() {
        fetch(target, { method: 'GET', cache: 'no-store', mode: 'no-cors' })
          .then(() => {
            window.location.replace(target);
          })
          .catch(() => {
            attempts += 1;
            if (attempts < maxAttempts) {
              setTimeout(tryOpen, 400);
            } else {
              document.querySelector('h1').textContent = 'Startup Failed';
              document.querySelector('p').innerHTML = 'The server took too long to start. Please check the logs in <code>local_data/dev.log</code> or try running Start.bat again.';
              const spinner = document.querySelector('.spinner');
              if (spinner) {
                spinner.style.borderTopColor = '#ef4444';
                spinner.style.animationPlayState = 'paused';
              }
            }
          });
      }

      tryOpen();
    </script>
  </body>
</html>
